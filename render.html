<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XRP Field</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background: #1a1a1a;
        color: #e0e0e0;
        font-family: monospace;
        margin: 0;
        padding: 0;
      }
      #canvas-container {
        width: 100vw;
        overflow: hidden;
      }
      #field {
        display: block;
        background: #2d6a2d;
      }
      #panel {
        padding: 10px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-size: 11px;
      }
      td,
      th {
        border: 1px solid #444;
        padding: 3px 6px;
      }
      th {
        background: #333;
      }
      .section-title {
        margin: 10px 0 4px;
        font-weight: bold;
        font-size: 13px;
      }
      input[inputmode='numeric'] {
        width: 70px;
        background: #333;
        color: #e0e0e0;
        border: 1px solid #666;
      }
      input[type='text'] {
        background: #333;
        color: #e0e0e0;
        border: 1px solid #666;
      }
      button {
        background: #555;
        color: #e0e0e0;
        border: 1px solid #888;
        cursor: pointer;
        padding: 2px 8px;
      }
      button:hover {
        background: #777;
      }
      #ball-info {
        font-size: 12px;
        margin: 4px 0;
      }
      #joysticks {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 8px;
      }
      .joystick-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .joystick-label {
        font-size: 11px;
      }
      .joystick-canvas {
        touch-action: none;
        user-select: none;
        cursor: grab;
        border: 1px solid #555;
        border-radius: 4px;
        background: #222;
        display: block;
        width: 160px;
        height: 160px;
        flex: none;
      }
      #ov-id {
        width: 80px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container">
      <canvas id="field"></canvas>
    </div>
    <div id="panel">
      <div>
        <button onclick="train(true)">Start Training</button>
        <span id="training-info"></span>
        <button onclick="train(false)">Stop Training</button>
        <button onclick="toggleQState()" id="show-qstate">Visualize</button>
        <button onclick="toggleQMode()" id="show-qmode">Avg</button>
        <button onclick="toggleQUpdate()" id="show-qupdate">Once</button>
        <button onclick="hideExtended()" id="hide-ext">Hide</button>
      </div>
      <div id="extended">
        <div class="section-title">Ball State</div>
        <div id="ball-info">x: - &nbsp; y: - &nbsp; vx: - &nbsp; vy: -</div>
        <div class="section-title">Robots</div>
        <table id="robot-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>X mm</th>
              <th>Y mm</th>
              <th>Hdg</th>
              <th>IMU</th>
              <th>Dist cm</th>
              <th>Refl L</th>
              <th>Refl R</th>
              <th>Enc L</th>
              <th>Enc R</th>
              <th>Team</th>
              <th>Virt</th>
            </tr>
          </thead>
          <tbody id="robot-tbody"></tbody>
        </table>
        <div class="section-title">Pose Override / Create Virtual Robot</div>
        <div>
          Robot ID: <input id="ov-id" type="text" /> X mm:
          <input id="ov-x" type="text" inputmode="numeric" value="0" /> Y mm:
          <input id="ov-y" type="text" inputmode="numeric" value="0" /> Hdg:
          <input id="ov-hdg" type="text" inputmode="numeric" value="0" />
          <button onclick="sendOverride()">Set</button>
          Team:
          <select id="ov-team">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
          </select>
          <button onclick="sendTeam()">Set Team</button>
        </div>
        <div class="section-title">Ball Control</div>
        <div>
          X mm: <input id="ball-x" type="text" inputmode="numeric" value="0" /> Y mm:
          <input id="ball-y" type="text" inputmode="numeric" value="0" /> Vel X mm/s:
          <input id="ball-vx" type="text" inputmode="numeric" value="0" /> Vel Y mm/s:
          <input id="ball-vy" type="text" inputmode="numeric" value="0" />
          <button onclick="sendBallState()">Set</button>
        </div>
        <div class="section-title">Virtual Robot Controls</div>
        <div id="joysticks"></div>
      </div>
    </div>
    <script>
      MAINSCRIPT;
    </script>
  </body>
</html>
